      <path d="M0,-120 L5,-95 L-5,-95Z" fill="#DE2110"/>
    </g>
    <g transform="rotate(216)">
      <path d="M0,-120 C20,-80 60,-60 0,-10 C-60,-60 -20,-80 0,-120Z"/>
      <path d="M0,-120 L5,-95 L-5,-95Z" fill="#DE2110"/>
